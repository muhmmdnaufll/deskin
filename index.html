<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#063b75" />
  <meta name="description" content="DeSkin - digital skin assistant berbasis AI, edukasi, konsultasi, rekomendasi produk, dan progress tracking." />
  <title>DeSkin - Digital Skin Assistant</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=1.0.6-fix" />
  <style>
    .chat-box{overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}.message{height:auto!important;max-height:none!important;overflow:visible!important;white-space:normal!important}.message p,.ai-output{margin:0;white-space:normal;overflow:visible;overflow-wrap:anywhere;word-break:normal;line-height:1.58}.message small{display:block;margin-top:12px}.ai-output{display:grid;gap:12px;color:var(--text)}.deskin-ai-btn{white-space:nowrap}#videoPreview,.mirror-preview{transform:scaleX(-1)}.camera-box img{object-position:center}@media(max-width:520px){.message{max-width:92%!important}.message p,.ai-output{font-size:16px;line-height:1.62}.row .deskin-ai-btn,.hero-actions .deskin-ai-btn{width:100%}.topbar h1{max-width:58vw;overflow-wrap:anywhere}}
  </style>
</head>
<body>
  <noscript>Aktifkan JavaScript untuk menggunakan aplikasi DeSkin.</noscript>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside class="sidebar" aria-label="Navigasi utama">
    <a class="brand" href="#/dashboard" aria-label="DeSkin Home">
      <span class="brand-mark">D</span>
      <span>
        <strong>DeSkin</strong>
        <small>Digital Skin Assistant</small>
      </span>
    </a>
    <nav id="mainNav" class="nav"></nav>
    <div class="side-card">
      <p class="eyebrow">Mode ringan</p>
      <p>Semua data demo disimpan lokal di browser.</p>
    </div>
  </aside>

  <header class="topbar">
    <button id="menuBtn" class="icon-btn" type="button" aria-label="Buka menu">☰</button>
    <div>
      <p class="eyebrow">DeSkin</p>
      <h1 id="pageTitle">DeSkin</h1>
    </div>
    <div class="top-actions">
      <button id="installBtn" class="ghost-btn hidden" type="button">Install App</button>
      <button id="themeBtn" class="icon-btn" type="button" aria-label="Ganti tema">◐</button>
    </div>
  </header>

  <main id="app" class="app" tabindex="-1"></main>

  <template id="modalTemplate">
    <div class="modal-backdrop" role="presentation">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close icon-btn" type="button" aria-label="Tutup">×</button>
        <div class="modal-body"></div>
      </section>
    </div>
  </template>

  <script>
    window.addEventListener("error", function (event) {
      var app = document.getElementById("app");
      if (!app) return;
      app.innerHTML = '<section class="container card stack"><h2>Aplikasi gagal dimuat</h2><p class="muted">Silakan refresh halaman. Jika masih kosong, hapus cache/site data browser lalu buka ulang.</p><p class="muted">Detail: ' + String(event.message || "unknown error") + '</p></section>';
    });
  </script>
  <script src="app-fixed.js?v=1.0.6-fix" defer></script>
  <script src="enhance-v106.js?v=1.0.6-fix" defer></script>
</body>
</html>
