<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#063b75" />
  <meta name="description" content="DeSkin - digital skin assistant berbasis AI, edukasi, rekomendasi produk, analisis kulit, dan konsultasi." />
  <title>DeSkin - Digital Skin Assistant</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="main.css?v=1.1.2" />
</head>
<body>
  <noscript>Aktifkan JavaScript untuk menggunakan aplikasi DeSkin.</noscript>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside class="sidebar" aria-label="Navigasi utama">
    <a class="brand" href="#/dashboard" aria-label="DeSkin Home"><span class="brand-mark">D</span><span><strong>DeSkin</strong><small>Digital Skin Assistant</small></span></a>
    <nav id="mainNav" class="nav"></nav>
    <div class="side-card"><p class="eyebrow">DeSkin</p><p>Perawatan kulit lebih terarah, ringan, dan personal.</p></div>
  </aside>

  <header class="topbar">
    <button id="menuBtn" class="icon-btn" type="button" aria-label="Buka menu">☰</button>
    <div><p class="eyebrow">DeSkin</p><h1 id="pageTitle">DeSkin</h1></div>
    <div class="top-actions"><button id="themeBtn" class="icon-btn" type="button" aria-label="Ganti tema">◐</button></div>
  </header>

  <main id="app" class="app" tabindex="-1"></main>

  <template id="modalTemplate">
    <div class="modal-backdrop"><section class="modal"><button class="modal-close icon-btn" type="button">×</button><div class="modal-body"></div></section></div>
  </template>

  <script>
(() => {
  const VERSION = '1.1.2';
  const STORE = 'deskin_state_v112';
  const SESSION = 'deskin_session_v112';
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
  const app = $('#app');
  const nav = $('#mainNav');
  const titleEl = $('#pageTitle');
  const toastEl = $('#toast');
  let authMode = 'daftar';
  let cameraStream = null;
  let pendingScan = null;

  const navItems = [
    ['#/dashboard', 'Dashboard'], ['#/daily', 'SKINDaily'], ['#/recom', 'DESKINRecom'], ['#/edu', 'SKINEdu'],
    ['#/analyzer', 'SKINAnalyzer'], ['#/analysis', 'SKINAnalysis'], ['#/talk', 'SKINTalk'], ['#/profile', 'Profil']
  ];

  const products = [
    { id:'cleanser', name:'Cleanser low pH lembut', cat:'Cleanser', min:45000, max:120000, issues:['acne','oil'], tags:['low pH','lembut','tanpa pewangi'] },
    { id:'moist', name:'Moisturizer ceramide', cat:'Moisturizer', min:65000, max:180000, issues:['dry','redness'], tags:['ceramide','barrier','ringan'] },
    { id:'spf', name:'Sunscreen SPF 50', cat:'Sunscreen', min:55000, max:170000, issues:['uv','oil'], tags:['spf50','harian','ringan'] },
    { id:'nia', name:'Serum niacinamide', cat:'Serum', min:55000, max:160000, issues:['oil','pores','acne'], tags:['niacinamide','sebum','pori'] },
    { id:'toner', name:'Hydrating toner', cat:'Toner', min:45000, max:145000, issues:['dry','texture'], tags:['hidrasi','alkohol-free','ringan'] },
    { id:'bha', name:'Eksfoliasi BHA ringan', cat:'Treatment', min:75000, max:210000, issues:['acne','pores','texture'], tags:['BHA','komedo','bertahap'] },
    { id:'centella', name:'Calming cream centella', cat:'Moisturizer', min:60000, max:165000, issues:['redness','dry'], tags:['centella','calming','barrier'] },
    { id:'spot', name:'Spot treatment jerawat', cat:'Treatment', min:35000, max:120000, issues:['acne'], tags:['spot care','malam','targeted'] }
  ];

  const defaultRoutine = ['Cleanser lembut','Moisturizer','Sunscreen SPF 30+','Cleanser malam','Treatment sesuai kebutuhan','Moisturizer malam']
    .map((title, i) => ({ id:'r' + i, title, time:i < 3 ? 'Pagi' : 'Malam', done:false }));

  function baseState() {
    return { theme:'light', user:null, guest:false, skinType:'normal', concerns:[], routine:defaultRoutine, notes:[], analyses:[], saved:[], messages:[], appointments:[] };
  }
  let state = loadState();

  function loadState() { try { return Object.assign(baseState(), JSON.parse(localStorage.getItem(STORE) || '{}')); } catch { return baseState(); } }
  function saveState() { localStorage.setItem(STORE, JSON.stringify(state)); }
  function ready() { return sessionStorage.getItem(SESSION) === 'yes'; }
  function enter(guest) { state.guest = guest; sessionStorage.setItem(SESSION, 'yes'); saveState(); location.hash = '#/dashboard'; }
  function setTitle(text) { titleEl.textContent = text; }

  function boot() {
    document.documentElement.dataset.theme = state.theme || 'light';
    nav.innerHTML = navItems.map((n, i) => `<a href="${n[0]}" data-path="${n[0]}"><span class="ico">${String(i + 1).padStart(2,'0')}</span><span>${n[1]}</span></a>`).join('');
    $('#menuBtn').onclick = () => document.body.classList.toggle('menu-open');
    $('#themeBtn').onclick = () => { state.theme = state.theme === 'dark' ? 'light' : 'dark'; document.documentElement.dataset.theme = state.theme; saveState(); };
    if (!location.hash) location.hash = '#/welcome';
    addEventListener('hashchange', route);
    route();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }

  function route() {
    stopCamera();
    document.body.classList.remove('menu-open');
    if (location.hash === '#/market') location.hash = '#/recom';
    if (!ready() && !['#/welcome', '#/auth'].includes(location.hash)) { location.hash = '#/welcome'; return; }
    $$('.nav a').forEach(a => a.classList.toggle('active', a.dataset.path === location.hash));
    const page = { '#/welcome':welcome, '#/auth':auth, '#/dashboard':dashboard, '#/daily':daily, '#/recom':recom, '#/edu':edu, '#/analyzer':analyzer, '#/analysis':analysis, '#/talk':talk, '#/profile':profile }[location.hash] || welcome;
    page();
    copyright();
  }

  function welcome() {
    setTitle('Selamat datang');
    app.innerHTML = `<section class="container hero"><div><p class="eyebrow">DeSkin Inc.</p><h2>Digital skin assistant untuk rutinitas kulit yang lebih terarah.</h2><p>Kelola scan kulit, rutinitas harian, rekomendasi produk, edukasi, dan konsultasi dalam satu tempat.</p><div class="hero-actions"><a class="primary-btn" href="#/auth">Daftar atau login</a><button class="secondary-btn" id="guestBtn">Coba tanpa daftar</button></div></div><div class="device-card"><div class="between"><strong>DeSkin Assisted Detector</strong><span class="pill">Ready</span></div><div class="device"><span class="device-dot"></span></div><p>Analisis wajah membantu menyesuaikan rekomendasi dan memantau perubahan kulit.</p></div></section><p class="footer-note">Versi ${VERSION}</p>`;
    $('#guestBtn').onclick = () => enter(true);
  }

  function auth() {
    setTitle('Akses akun');
    app.innerHTML = `<section class="container auth-shell"><div class="card auth-card"><div class="auth-side"><p class="eyebrow">DeSkin Account</p><h2>Pilih cara masuk yang paling sesuai.</h2><p>Profil membantu DeSkin menyesuaikan rekomendasi dengan kebutuhan kulit kamu.</p></div><form id="authForm" class="auth-form form-grid"><div class="tabs"><button class="tab-btn ${authMode==='daftar'?'active':''}" data-mode="daftar" type="button">Daftar</button><button class="tab-btn ${authMode==='login'?'active':''}" data-mode="login" type="button">Login</button><button class="tab-btn" data-mode="guest" type="button">Coba tanpa daftar</button></div><h2>${authMode === 'login' ? 'Login' : 'Daftar'}</h2><label>Nama<input name="name" value="${esc(state.user?.name || '')}"></label><label>Email<input name="email" type="email" value="${esc(state.user?.email || '')}"></label><label>Tipe kulit<select name="skinType">${skinOptions(state.skinType)}</select></label><button class="primary-btn">Masuk</button></form></div></section>`;
    $$('.tab-btn').forEach(btn => btn.onclick = () => { authMode = btn.dataset.mode; if (authMode === 'guest') enter(true); else auth(); });
    $('#authForm').onsubmit = e => { e.preventDefault(); const d = Object.fromEntries(new FormData(e.target)); state.user = { name:d.name || 'Pengguna', email:d.email || '' }; state.skinType = d.skinType; enter(false); };
  }

  function dashboard() {
    setTitle('Dashboard');
    const a = latest();
    const sc = skinScore(a);
    const done = completion();
    app.innerHTML = `<section class="container stack"><div class="hero"><div><p class="eyebrow">Halo, ${esc(firstName())}</p><h2>${a ? `Skor kulit terakhir ${sc}/100.` : 'Mulai dari scan wajah pertama.'}</h2><p>${a ? summary(a) : 'Scan wajah membuat rekomendasi rutinitas dan produk lebih personal.'}</p><div class="hero-actions"><a class="primary-btn" href="#/analyzer">Scan wajah</a><a class="secondary-btn" href="#/daily">Rutinitas</a><button class="secondary-btn" data-ai="Insight singkat untuk perawatan kulit saya.">Insight AI</button></div></div><div class="card stack"><div class="between"><div><p class="eyebrow">Skin Health</p><h3 style="margin:0">Ringkasan</h3></div><div class="progress-ring" style="--value:${sc}"><strong>${sc}</strong></div></div>${meters(a)}</div></div><div class="grid four"><div class="card stat"><span class="tag">Rutinitas</span><strong>${done}%</strong><small>Hari ini</small></div><div class="card stat"><span class="tag">Analisis</span><strong>${state.analyses.length}</strong><small>Riwayat</small></div><div class="card stat"><span class="tag">Produk</span><strong>${state.saved.length}</strong><small>Tersimpan</small></div><div class="card stat"><span class="tag">Tipe kulit</span><strong>${skinLabel(state.skinType)}</strong><small>${state.concerns.map(concernLabel).join(', ') || 'Belum ada fokus'}</small></div></div><div class="grid two"><section class="card stack"><div class="between"><h2>Rutinitas</h2><a class="ghost-btn" href="#/daily">Kelola</a></div><div class="list">${state.routine.slice(0,4).map(routineItem).join('')}</div></section><section class="card stack"><div class="between"><h2>DESKINRecom</h2><a class="ghost-btn" href="#/recom">Lihat semua</a></div><div class="grid three">${recommend().slice(0,3).map(productCard).join('')}</div></section></div></section>`;
    bindCommon();
  }

  function daily() {
    setTitle('SKINDaily');
    app.innerHTML = `<section class="container stack"><div class="between"><div><p class="eyebrow">SKINDaily</p><h2>Rutinitas dan catatan kulit</h2><p class="muted">Pantau kebiasaan harian dan perubahan kulit.</p></div><button class="secondary-btn" data-ai="Susun rutinitas pagi dan malam yang sederhana.">Saran AI</button></div><div class="grid two"><section class="card stack"><h2>Checklist</h2><div id="routineList" class="list">${state.routine.map(routineItem).join('')}</div><button id="saveRoutine" class="primary-btn">Simpan progres</button></section><section class="card stack"><h2>Catatan</h2><textarea id="note" placeholder="Contoh: kurang tidur, produk baru, kulit terasa kering..."></textarea><button id="saveNote" class="secondary-btn">Simpan catatan</button><div class="list">${state.notes.slice(0,4).map(n => `<div class="panel"><strong>${dateFormat(n.at)}</strong><p class="muted">${esc(n.text)}</p></div>`).join('') || '<p class="muted">Belum ada catatan.</p>'}</div></section></div></section>`;
    $('#routineList').onchange = e => { if (e.target.matches('input')) { state.routine = state.routine.map(r => r.id === e.target.value ? {...r, done:e.target.checked} : r); saveState(); daily(); } };
    $('#saveRoutine').onclick = () => { state.routine = state.routine.map(r => ({...r, done:false})); saveState(); daily(); };
    $('#saveNote').onclick = () => { const v = $('#note').value.trim(); if (v) { state.notes.unshift({ text:v, at:new Date().toISOString() }); saveState(); daily(); } };
    bindCommon();
  }

  function recom() {
    setTitle('DESKINRecom');
    app.innerHTML = `<section class="container stack"><div class="between"><div><p class="eyebrow">DESKINRecom</p><h2>Rekomendasi produk</h2><p class="muted">Produk diurutkan dari kecocokan profil, hasil scan, dan kisaran harga pasar.</p></div><button class="primary-btn" data-ai="Tinjau urutan produk dan kisaran harganya.">Tinjau dengan AI</button></div><div class="card row"><input id="q" placeholder="Cari produk..."><select id="issue"><option value="all">Semua fokus</option><option value="acne">Jerawat</option><option value="oil">Minyak</option><option value="dry">Kering</option><option value="pores">Pori</option><option value="redness">Kemerahan</option></select></div><div id="productGrid" class="grid four"></div><section class="card stack"><h2>Produk tersimpan</h2><div class="list">${savedProducts()}</div></section></section>`;
    const render = () => { const q = $('#q').value.toLowerCase(); const issue = $('#issue').value; $('#productGrid').innerHTML = recommend().filter(p => (p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)) && (issue === 'all' || p.issues.includes(issue))).map(productCard).join('') || '<p class="muted">Produk tidak ditemukan.</p>'; bindCommon(); };
    $('#q').oninput = render; $('#issue').onchange = render; render();
  }

  function edu() {
    setTitle('SKINEdu');
    const topics = ['Rutinitas pagi yang aman','Kulit berminyak dan dehidrasi','Bahan aktif secara bertahap','Tidur, stres, dan jerawat','Perlindungan UV harian','Skincare sederhana untuk pria'];
    app.innerHTML = `<section class="container stack"><div class="between"><div><p class="eyebrow">SKINEdu</p><h2>Edukasi skincare</h2><p class="muted">Materi singkat untuk memilih rutinitas dengan lebih aman.</p></div><button class="secondary-btn" data-ai="Buat materi edukasi sesuai fokus kulit saya.">Materi AI</button></div><div class="grid three">${topics.map((x,i) => `<article class="article-card"><div class="article-img">${i+1}</div><h3>${x}</h3><p class="muted">Panduan singkat untuk perawatan kulit harian.</p></article>`).join('')}</div></section>`;
    bindCommon();
  }

  function analyzer() {
    setTitle('SKINAnalyzer');
    app.innerHTML = `<section class="container stack"><div class="between"><div><p class="eyebrow">SKINAnalyzer</p><h2>Scan wajah</h2><p class="muted">Ambil foto wajah yang jelas untuk memperbarui rekomendasi.</p></div><button class="secondary-btn" data-ai="Beri tips foto scan wajah yang jelas.">Tips scan</button></div><div class="grid two"><section class="card stack"><div id="cameraBox" class="camera-box"><div class="stack" style="text-align:center;padding:22px"><h3>Preview kamera</h3><p class="muted">Buka kamera atau upload foto wajah.</p></div><span class="capture-overlay"></span></div><div class="row"><button id="openCamera" class="primary-btn">Buka kamera</button><button id="capturePhoto" class="secondary-btn" disabled>Capture</button><label class="ghost-btn" style="cursor:pointer">Upload foto<input id="uploadPhoto" type="file" accept="image/*" hidden></label></div></section><section class="card stack"><h2>Hasil scan</h2><div id="scanBox"><p class="muted">Belum ada hasil scan.</p></div><button id="saveScan" class="primary-btn" disabled>Simpan hasil scan</button></section></div></section>`;
    $('#openCamera').onclick = openCamera;
    $('#capturePhoto').onclick = capturePhoto;
    $('#uploadPhoto').onchange = uploadPhoto;
    $('#saveScan').onclick = saveScan;
    bindCommon();
  }

  function analysis() {
    setTitle('SKINAnalysis');
    const a = latest();
    app.innerHTML = `<section class="container stack"><div class="between"><div><p class="eyebrow">SKINAnalysis</p><h2>Analisis kulit</h2><p class="muted">Ringkasan hasil scan dan prioritas perawatan.</p></div><a class="primary-btn" href="#/analyzer">Scan baru</a></div>${a ? `<div class="grid two"><section class="card stack"><p class="eyebrow">Skin score</p><div class="progress-ring" style="--value:${skinScore(a)}"><strong>${skinScore(a)}</strong></div><p class="muted">${summary(a)}</p></section><section class="card stack"><h2>Parameter</h2>${meters(a)}</section></div>` : '<section class="card stack"><h2>Belum ada hasil scan</h2><a class="primary-btn" href="#/analyzer">Mulai scan</a></section>'}</section>`;
  }

  function talk() {
    setTitle('SKINTalk');
    app.innerHTML = `<section class="container stack"><div><p class="eyebrow">SKINTalk</p><h2>Konsultasi dan diskusi</h2><p class="muted">Tanyakan kondisi kulit atau rutinitas yang sedang digunakan.</p></div><section class="card stack"><div class="chat-box" id="chatBox">${state.messages.map(m => `<div class="message ${m.me ? 'me' : ''}">${esc(m.text)}<small>${esc(m.at)}</small></div>`).join('') || '<p class="muted">Mulai percakapan.</p>'}</div><form id="chatForm" class="row"><input name="text" placeholder="Tulis pertanyaan..." required><button class="primary-btn">Kirim</button></form></section></section>`;
    $('#chatForm').onsubmit = async e => { e.preventDefault(); const text = e.target.text.value.trim(); if (!text) return; e.target.text.value = ''; state.messages.push({ me:true, text, at:timeNow() }); saveState(); talk(); try { state.messages.push({ me:false, text:await askAIText(text), at:timeNow() }); } catch { state.messages.push({ me:false, text:'AI sedang tidak dapat menjawab. Coba lagi nanti.', at:timeNow() }); } saveState(); talk(); };
  }

  function profile() {
    setTitle('Profil');
    app.innerHTML = `<section class="container stack"><div><p class="eyebrow">Profil</p><h2>Preferensi kulit</h2><p class="muted">Atur profil agar rekomendasi lebih sesuai.</p></div><div class="grid two"><form id="profileForm" class="card form-grid"><label>Nama<input name="name" value="${esc(state.user?.name || '')}"></label><label>Email<input name="email" type="email" value="${esc(state.user?.email || '')}"></label><label>Tipe kulit<select name="skinType">${skinOptions(state.skinType)}</select></label><button class="primary-btn">Simpan profil</button></form><section class="card stack"><h2>Akses akun</h2><p class="muted">Status: ${state.guest ? 'Coba tanpa daftar' : state.user ? 'Login aktif' : 'Belum memilih akses'}</p><div class="row"><a class="primary-btn" href="#/auth">Daftar</a><a class="secondary-btn" href="#/auth">Login</a><button class="ghost-btn" id="guestProfile">Coba tanpa daftar</button></div></section></div></section>`;
    $('#profileForm').onsubmit = e => { e.preventDefault(); const d = Object.fromEntries(new FormData(e.target)); state.user = { name:d.name || 'Pengguna', email:d.email || '' }; state.skinType = d.skinType; state.guest = false; saveState(); profile(); };
    $('#guestProfile').onclick = () => enter(true);
  }

  async function openCamera() {
    try {
      stopCamera();
      cameraStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
      $('#cameraBox').innerHTML = '<video id="videoPreview" autoplay playsinline muted></video><span class="capture-overlay"></span>';
      $('#videoPreview').srcObject = cameraStream;
      $('#capturePhoto').disabled = false;
      toastMsg('Kamera aktif.');
    } catch {
      toastMsg('Kamera tidak dapat dibuka. Gunakan upload foto.');
    }
  }

  function capturePhoto() {
    const video = $('#videoPreview');
    if (!video) { toastMsg('Buka kamera lebih dulu.'); return; }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 720;
    canvas.height = video.videoHeight || 720;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.86);
    $('#cameraBox').innerHTML = `<img src="${dataUrl}" alt="Foto scan wajah"><span class="capture-overlay"></span>`;
    stopCamera();
    analyzeDataUrl(dataUrl);
  }

  function uploadPhoto(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = String(reader.result);
      $('#cameraBox').innerHTML = `<img src="${dataUrl}" alt="Foto scan wajah"><span class="capture-overlay"></span>`;
      analyzeDataUrl(dataUrl);
    };
    reader.readAsDataURL(file);
  }

  function analyzeDataUrl(dataUrl) {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 96;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d', { willReadFrequently:true });
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;
      let bright = 0, red = 0, warm = 0, contrast = 0, count = 0;
      for (let i = 0; i < data.length; i += 16) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const y = (r + g + b) / 3;
        bright += y;
        red += Math.max(0, r - Math.max(g, b));
        warm += (r > 70 && g > 45 && b > 30 && r > b) ? 1 : 0;
        contrast += Math.abs(r - g) + Math.abs(g - b);
        count++;
      }
      bright /= Math.max(1, count);
      red /= Math.max(1, count);
      const faceHint = warm / Math.max(1, count);
      pendingScan = {
        date:new Date().toISOString(),
        moisture:clamp(72 - Math.abs(135 - bright) * 0.25),
        sebum:clamp(38 + Math.max(0, bright - 138) * 0.35 + faceHint * 22),
        texture:clamp(82 - contrast * 0.035),
        acne:clamp(22 + red * 0.9 + faceHint * 12),
        sensitivity:clamp(18 + red * 0.65),
        notes:'Hasil scan tersimpan.'
      };
      $('#scanBox').innerHTML = `<div class="panel"><strong>Scan siap disimpan</strong><p class="muted">${summary(pendingScan)}</p></div>${meters(pendingScan)}`;
      $('#saveScan').disabled = false;
      toastMsg('Scan selesai.');
    };
    img.onerror = () => toastMsg('Foto tidak dapat dibaca.');
    img.src = dataUrl;
  }

  function saveScan() {
    if (!pendingScan) return;
    state.analyses.push(pendingScan);
    const next = [];
    if (pendingScan.acne > 50) next.push('acne');
    if (pendingScan.sebum > 62) next.push('oil');
    if (pendingScan.moisture < 48) next.push('dry');
    if (pendingScan.sensitivity > 42) next.push('redness');
    state.concerns = Array.from(new Set(next.concat(state.concerns)));
    pendingScan = null;
    saveState();
    location.hash = '#/analysis';
  }

  function stopCamera() { if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; } }

  function bindCommon() {
    $$('[data-save]').forEach(b => b.onclick = () => { if (!state.saved.includes(b.dataset.save)) state.saved.push(b.dataset.save); saveState(); toastMsg('Produk tersimpan.'); });
    $$('[data-ai]').forEach(b => b.onclick = () => askAI(b.dataset.ai));
  }

  async function askAI(text) {
    openModal('<h2 id="modalTitle">DeSkin AI</h2><p class="muted">Menyiapkan jawaban...</p>');
    try { $('.modal-body').innerHTML = '<h2 id="modalTitle">DeSkin AI</h2><p>' + esc(await askAIText(text)) + '</p>'; }
    catch { $('.modal-body').innerHTML = '<h2 id="modalTitle">DeSkin AI</h2><p>AI sedang tidak tersedia.</p>'; }
  }
  async function askAIText(text) {
    const response = await fetch('/api/ai', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ feature:'DeSkin', message:text }) });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || !data.ok) throw new Error('AI unavailable');
    return data.answer || 'Belum ada jawaban.';
  }

  function productCard(p) { return `<article class="product-card"><div class="product-img">${p.cat.slice(0,2).toUpperCase()}</div><h3>${esc(p.name)}</h3><p class="muted">${p.cat} · ${idr(p.min)} - ${idr(p.max)}</p><div class="row">${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div><div class="between"><span class="price">${productScore(p)} match</span><span class="pill">${((p.min+p.max)/2) <= 90000 ? 'Hemat' : 'Menengah'}</span></div><button class="primary-btn" data-save="${p.id}">Simpan</button></article>`; }
  function recommend() { return products.slice().sort((a,b) => productScore(b) - productScore(a)); }
  function productScore(p) { let s = 1; state.concerns.forEach(c => { if (p.issues.includes(c)) s++; }); if (state.skinType === 'oily' && p.issues.includes('oil')) s += 2; return s; }
  function savedProducts() { return state.saved.map(id => products.find(p => p.id === id)).filter(Boolean).map(p => `<div class="list-item"><strong>${esc(p.name)}</strong><p class="muted">${idr(p.min)} - ${idr(p.max)}</p></div>`).join('') || '<p class="muted">Belum ada produk tersimpan.</p>'; }
  function routineItem(r) { return `<label class="checkbox"><input type="checkbox" value="${r.id}" ${r.done ? 'checked' : ''}><span><strong>${esc(r.time)}</strong> - ${esc(r.title)}</span></label>`; }
  function completion() { return Math.round(state.routine.filter(r => r.done).length / state.routine.length * 100); }
  function latest() { return state.analyses[state.analyses.length - 1] || null; }
  function meters(a) { a = a || { moisture:0, sebum:0, texture:0, acne:0, sensitivity:0 }; return [['Kelembapan',a.moisture],['Sebum',a.sebum],['Tekstur',a.texture],['Acne risk',a.acne],['Sensitivitas',a.sensitivity]].map(x => `<div class="meter"><div class="between"><strong>${x[0]}</strong><span>${x[1]}/100</span></div><div class="meter-bar"><span style="--value:${x[1]}"></span></div></div>`).join(''); }
  function skinScore(a) { return a ? clamp(a.moisture*.24 + (100 - Math.abs(55-a.sebum))*.18 + a.texture*.22 + (100-a.acne)*.22 + (100-a.sensitivity)*.14) : 0; }
  function summary(a) { if (!a) return 'Belum ada hasil scan.'; if (a.acne > 60) return 'Fokus utama: jerawat.'; if (a.sebum > 68) return 'Sebum terlihat tinggi.'; if (a.moisture < 45) return 'Kelembapan rendah.'; return 'Kondisi cukup seimbang.'; }
  function openModal(html) { closeModal(); const t = $('#modalTemplate').content.cloneNode(true); $('.modal-body', t).innerHTML = html; $('.modal-close', t).onclick = closeModal; document.body.appendChild(t); }
  function closeModal() { $('.modal-backdrop')?.remove(); }
  function skinOptions(value) { return ['normal','oily','dry','combination','sensitive'].map(x => `<option value="${x}" ${x===value?'selected':''}>${skinLabel(x)}</option>`).join(''); }
  function skinLabel(v) { return { normal:'Normal', oily:'Berminyak', dry:'Kering', combination:'Kombinasi', sensitive:'Sensitif' }[v] || 'Normal'; }
  function concernLabel(v) { return { acne:'Jerawat', oil:'Minyak', dry:'Kering', pores:'Pori', redness:'Kemerahan', texture:'Tekstur', uv:'UV' }[v] || v; }
  function firstName() { return (state.user?.name || 'Pengguna').split(' ')[0]; }
  function idr(n) { return new Intl.NumberFormat('id-ID', { style:'currency', currency:'IDR', maximumFractionDigits:0 }).format(n); }
  function dateFormat(d) { return new Date(d).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' }); }
  function timeNow() { return new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }); }
  function clamp(x, min=0, max=100) { return Math.max(min, Math.min(max, Math.round(Number(x) || 0))); }
  function esc(x) { return String(x ?? '').replace(/[&<>'"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c])); }
  function toastMsg(text) { toastEl.textContent = text; toastEl.classList.add('show'); clearTimeout(toastEl._t); toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2600); }
  function copyright() { if ($('#deskinCopyright')) return; const p = document.createElement('p'); p.id = 'deskinCopyright'; p.textContent = '© 2026 Muhammad Naufal. All rights reserved.'; document.body.appendChild(p); }

  addEventListener('error', () => { app.innerHTML = '<section class="container card stack"><h2>Aplikasi gagal dimuat</h2><p class="muted">Muat ulang halaman untuk membuka kembali DeSkin.</p></section>'; });
  boot();
})();
  </script>
</body>
