<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#063b75" />
  <meta name="description" content="DeSkin - digital skin assistant berbasis AI, edukasi, rekomendasi produk, analisis kulit, dan konsultasi." />
  <title>DeSkin - Digital Skin Assistant</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="main.css?v=1.1.1" />
</head>
<body>
  <noscript>Aktifkan JavaScript untuk menggunakan aplikasi DeSkin.</noscript>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <aside class="sidebar" aria-label="Navigasi utama">
    <a class="brand" href="#/dashboard" aria-label="DeSkin Home"><span class="brand-mark">D</span><span><strong>DeSkin</strong><small>Digital Skin Assistant</small></span></a>
    <nav id="mainNav" class="nav"></nav>
    <div class="side-card"><p class="eyebrow">DeSkin</p><p>Perawatan kulit lebih terarah, ringan, dan personal.</p></div>
  </aside>
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" type="button" aria-label="Buka menu">☰</button>
    <div><p class="eyebrow">DeSkin</p><h1 id="pageTitle">DeSkin</h1></div>
    <div class="top-actions"><button id="themeBtn" class="icon-btn" type="button" aria-label="Ganti tema">◐</button></div>
  </header>
  <main id="app" class="app" tabindex="-1"></main>
  <template id="modalTemplate"><div class="modal-backdrop"><section class="modal"><button class="modal-close icon-btn" type="button">×</button><div class="modal-body"></div></section></div></template>
  <script>
(() => {
  const VERSION='1.1.1', STORE='deskin_state_v111', SESSION='deskin_session_v111';
  const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
  const app=$('#app'), nav=$('#mainNav'), title=$('#pageTitle'), toast=$('#toast');
  const products=[['Cleanser low pH lembut','Cleanser',45000,120000,['acne','oil'],['low pH','lembut','tanpa pewangi']],['Moisturizer ceramide','Moisturizer',65000,180000,['dry','redness'],['ceramide','barrier','ringan']],['Sunscreen SPF 50','Sunscreen',55000,170000,['uv','oil'],['spf50','harian','ringan']],['Serum niacinamide','Serum',55000,160000,['oil','pores','acne'],['niacinamide','sebum','pori']],['Hydrating toner','Toner',45000,145000,['dry','texture'],['hidrasi','alkohol-free','ringan']],['Eksfoliasi BHA ringan','Treatment',75000,210000,['acne','pores'],['BHA','komedo','bertahap']],['Calming cream centella','Moisturizer',60000,165000,['redness','dry'],['centella','calming','barrier']],['Spot treatment jerawat','Treatment',35000,120000,['acne'],['spot care','malam','targeted']]].map((p,i)=>({id:'p'+i,name:p[0],cat:p[1],min:p[2],max:p[3],issues:p[4],tags:p[5]}));
  const navItems=[['#/dashboard','Dashboard'],['#/daily','SKINDaily'],['#/recom','DESKINRecom'],['#/edu','SKINEdu'],['#/analyzer','SKINAnalyzer'],['#/analysis','SKINAnalysis'],['#/talk','SKINTalk'],['#/profile','Profil']];
  let state=load(), authMode='daftar', scan=null;
  function base(){return{theme:'light',user:null,guest:false,skinType:'normal',concerns:[],routine:['Cleanser lembut','Moisturizer','Sunscreen SPF 30+','Cleanser malam','Treatment','Moisturizer malam'].map((x,i)=>({id:'r'+i,title:x,time:i<3?'Pagi':'Malam',done:false})),notes:[],analyses:[],saved:[],messages:[],appointments:[]}}
  function load(){try{return Object.assign(base(),JSON.parse(localStorage.getItem(STORE)||'{}'))}catch{return base()}}
  function save(){localStorage.setItem(STORE,JSON.stringify(state))}
  function ready(){return sessionStorage.getItem(SESSION)==='yes'}
  function enter(guest){state.guest=guest;sessionStorage.setItem(SESSION,'yes');save();location.hash='#/dashboard'}
  function boot(){document.documentElement.dataset.theme=state.theme;nav.innerHTML=navItems.map((n,i)=>`<a href="${n[0]}" data-path="${n[0]}"><span class="ico">${String(i+1).padStart(2,'0')}</span><span>${n[1]}</span></a>`).join('');$('#menuBtn').onclick=()=>document.body.classList.toggle('menu-open');$('#themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=state.theme;save()};if(!location.hash)location.hash='#/welcome';addEventListener('hashchange',route);route();if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})}
  function route(){document.body.classList.remove('menu-open');if(location.hash==='#/market')location.hash='#/recom';if(!ready()&&!['#/welcome','#/auth'].includes(location.hash)){location.hash='#/welcome';return}$$('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.path===location.hash));({ '#/welcome':welcome,'#/auth':auth,'#/dashboard':dashboard,'#/daily':daily,'#/recom':recom,'#/edu':edu,'#/analyzer':analyzer,'#/analysis':analysis,'#/talk':talk,'#/profile':profile}[location.hash]||welcome)();copyright()}
  function setTitle(x){title.textContent=x}
  function welcome(){setTitle('Selamat datang');app.innerHTML=`<section class="container hero"><div><p class="eyebrow">DeSkin Inc.</p><h2>Digital skin assistant untuk rutinitas kulit yang lebih terarah.</h2><p>Kelola scan kulit, rutinitas harian, rekomendasi produk, edukasi, dan konsultasi dalam satu tempat.</p><div class="hero-actions"><a class="primary-btn" href="#/auth">Daftar atau login</a><button class="secondary-btn" id="guest">Coba tanpa daftar</button></div></div><div class="device-card"><div class="between"><strong>DeSkin Assisted Detector</strong><span class="pill">Ready</span></div><div class="device"><span class="device-dot"></span></div><p>Analisis wajah membantu menyesuaikan rekomendasi dan memantau perubahan kulit.</p></div></section><p class="footer-note">Versi ${VERSION}</p>`;$('#guest').onclick=()=>enter(true)}
  function auth(){setTitle('Akses akun');app.innerHTML=`<section class="container auth-shell"><div class="card auth-card"><div class="auth-side"><p class="eyebrow">DeSkin Account</p><h2>Pilih cara masuk yang paling sesuai.</h2><p>Profil membantu DeSkin menyesuaikan rekomendasi dengan kebutuhan kulit kamu.</p></div><form id="authForm" class="auth-form form-grid"><div class="tabs"><button class="tab-btn ${authMode==='daftar'?'active':''}" data-m="daftar" type="button">Daftar</button><button class="tab-btn ${authMode==='login'?'active':''}" data-m="login" type="button">Login</button><button class="tab-btn" data-m="guest" type="button">Coba tanpa daftar</button></div><h2>${authMode==='login'?'Login':'Daftar'}</h2><label>Nama<input name="name" value="${esc(state.user?.name||'')}"></label><label>Email<input name="email" type="email" value="${esc(state.user?.email||'')}"></label><label>Tipe kulit<select name="skinType">${opts(['normal','oily','dry','combination','sensitive'],state.skinType)}</select></label><button class="primary-btn">Masuk</button></form></div></section>`;$$('.tab-btn').forEach(b=>b.onclick=()=>{authMode=b.dataset.m;if(authMode==='guest')enter(true);else auth()});$('#authForm').onsubmit=e=>{e.preventDefault();const d=Object.fromEntries(new FormData(e.target));state.user={name:d.name||'Pengguna',email:d.email||''};state.skinType=d.skinType;enter(false)}}
  function dashboard(){setTitle('Dashboard');const a=last(),sc=score(a),done=complete();app.innerHTML=`<section class="container stack"><div class="hero"><div><p class="eyebrow">Halo, ${esc((state.user?.name||'Pengguna').split(' ')[0])}</p><h2>${a?`Skor kulit terakhir ${sc}/100.`:'Mulai dari scan wajah pertama.'}</h2><p>${a?summary(a):'Scan wajah membuat rekomendasi rutinitas dan produk lebih personal.'}</p><div class="hero-actions"><a class="primary-btn" href="#/analyzer">Scan wajah</a><a class="secondary-btn" href="#/daily">Rutinitas</a><button class="secondary-btn" data-ai="Insight singkat untuk perawatan kulit saya.">Insight AI</button></div></div><div class="card stack"><div class="between"><div><p class="eyebrow">Skin Health</p><h3 style="margin:0">Ringkasan</h3></div><div class="progress-ring" style="--value:${sc}"><strong>${sc}</strong></div></div>${meters(a)}</div></div><div class="grid four"><div class="card stat"><span class="tag">Rutinitas</span><strong>${done}%</strong><small>Hari ini</small></div><div class="card stat"><span class="tag">Analisis</span><strong>${state.analyses.length}</strong><small>Riwayat</small></div><div class="card stat"><span class="tag">Produk</span><strong>${state.saved.length}</strong><small>Tersimpan</small></div><div class="card stat"><span class="tag">Tipe kulit</span><strong>${skin(state.skinType)}</strong><small>${state.concerns.map(label).join(', ')||'Belum ada fokus'}</small></div></div><div class="grid two"><section class="card stack"><div class="between"><h2>Rutinitas</h2><a class="ghost-btn" href="#/daily">Kelola</a></div><div class="list">${state.routine.slice(0,4).map(routine).join('')}</div></section><section class="card stack"><div class="between"><h2>DESKINRecom</h2><a class="ghost-btn" href="#/recom">Lihat semua</a></div><div class="grid three">${recommend().slice(0,3).map(card).join('')}</div></section></div></section>`;bind()}
  function daily(){setTitle('SKINDaily');app.innerHTML=`<section class="container stack"><div class="between"><div><p class="eyebrow">SKINDaily</p><h2>Rutinitas dan catatan kulit</h2><p class="muted">Pantau kebiasaan harian dan perubahan kulit.</p></div><button class="secondary-btn" data-ai="Susun rutinitas pagi dan malam yang sederhana.">Saran AI</button></div><div class="grid two"><section class="card stack"><h2>Checklist</h2><div id="routineList" class="list">${state.routine.map(routine).join('')}</div><button id="saveRoutine" class="primary-btn">Simpan progres</button></section><section class="card stack"><h2>Catatan</h2><textarea id="note" placeholder="Contoh: kurang tidur, produk baru, kulit terasa kering..."></textarea><button id="saveNote" class="secondary-btn">Simpan catatan</button><div class="list">${state.notes.slice(0,4).map(n=>`<div class="panel"><strong>${date(n.at)}</strong><p class="muted">${esc(n.text)}</p></div>`).join('')||'<p class="muted">Belum ada catatan.</p>'}</div></section></div></section>`;$('#routineList').onchange=e=>{if(e.target.matches('input')){state.routine=state.routine.map(r=>r.id===e.target.value?{...r,done:e.target.checked}:r);save();daily()}};$('#saveRoutine').onclick=()=>{state.routine=state.routine.map(r=>({...r,done:false}));save();daily()};$('#saveNote').onclick=()=>{const v=$('#note').value.trim();if(v){state.notes.unshift({text:v,at:new Date().toISOString()});save();daily()}};bind()}
  function recom(){setTitle('DESKINRecom');app.innerHTML=`<section class="container stack"><div class="between"><div><p class="eyebrow">DESKINRecom</p><h2>Rekomendasi produk</h2><p class="muted">Produk diurutkan dari kecocokan profil, hasil scan, dan kisaran harga pasar.</p></div><button class="primary-btn" data-ai="Tinjau urutan produk dan kisaran harganya.">Tinjau dengan AI</button></div><div class="card row"><input id="q" placeholder="Cari produk..."><select id="issue"><option value="all">Semua fokus</option><option value="acne">Jerawat</option><option value="oil">Minyak</option><option value="dry">Kering</option><option value="pores">Pori</option><option value="redness">Kemerahan</option></select></div><div id="productGrid" class="grid four"></div><section class="card stack"><h2>Produk tersimpan</h2><div class="list">${saved()}</div></section></section>`;const render=()=>{const q=$('#q').value.toLowerCase(),is=$('#issue').value;$('#productGrid').innerHTML=recommend().filter(p=>(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q))&&(is==='all'||p.issues.includes(is))).map(card).join('')||'<p class="muted">Produk tidak ditemukan.</p>';bind()};$('#q').oninput=render;$('#issue').onchange=render;render()}
  function edu(){setTitle('SKINEdu');app.innerHTML=`<section class="container stack"><div class="between"><div><p class="eyebrow">SKINEdu</p><h2>Edukasi skincare</h2><p class="muted">Materi singkat untuk memilih rutinitas dengan lebih aman.</p></div><button class="secondary-btn" data-ai="Buat materi edukasi sesuai fokus kulit saya.">Materi AI</button></div><div class="grid three">${['Rutinitas pagi yang aman','Kulit berminyak dan dehidrasi','Bahan aktif secara bertahap','Tidur, stres, dan jerawat','Perlindungan UV harian','Skincare sederhana untuk pria'].map((x,i)=>`<article class="article-card"><div class="article-img">${i+1}</div><h3>${x}</h3><p class="muted">Panduan singkat untuk perawatan kulit harian.</p></article>`).join('')}</div></section>`;bind()}
  function analyzer(){setTitle('SKINAnalyzer');app.innerHTML=`<section class="container stack"><div class="between"><div><p class="eyebrow">SKINAnalyzer</p><h2>Scan wajah</h2><p class="muted">Ambil foto wajah yang jelas untuk memperbarui rekomendasi.</p></div><button class="secondary-btn" data-ai="Beri tips foto scan wajah yang jelas.">Tips scan</button></div><div class="grid two"><section class="card stack"><div id="cameraBox" class="camera-box"><div class="stack" style="text-align:center;padding:22px"><h3>Preview kamera</h3><p class="muted">Wajah di tengah dengan cahaya depan.</p></div><span class="capture-overlay"></span></div><div class="row"><button id="scanNow" class="primary-btn">Buat hasil scan</button></div></section><section class="card stack"><h2>Hasil scan</h2><div id="scanBox"><p class="muted">Belum ada hasil scan.</p></div><button id="saveScan" class="primary-btn" disabled>Simpan hasil scan</button></section></div></section>`;$('#scanNow').onclick=()=>{const b=last()||{moisture:55,sebum:55,texture:60,acne:35,sensitivity:25};scan={date:new Date().toISOString(),moisture:clamp(b.moisture+rnd(-6,8)),sebum:clamp(b.sebum+rnd(-8,10)),texture:clamp(b.texture+rnd(-8,8)),acne:clamp(b.acne+rnd(-10,12)),sensitivity:clamp(b.sensitivity+rnd(-8,8)),notes:'Hasil scan tersimpan.'};$('#scanBox').innerHTML=meters(scan);$('#saveScan').disabled=false};$('#saveScan').onclick=()=>{if(scan){state.analyses.push(scan);state.concerns=[...new Set([...state.concerns,...(scan.acne>50?['acne']:[]),...(scan.sebum>62?['oil']:[]),...(scan.moisture<48?['dry']:[])])];scan=null;save();location.hash='#/analysis'}};bind()}
  function analysis(){setTitle('SKINAnalysis');const a=last();app.innerHTML=`<section class="container stack"><div class="between"><div><p class="eyebrow">SKINAnalysis</p><h2>Analisis kulit</h2><p class="muted">Ringkasan hasil scan dan prioritas perawatan.</p></div><a class="primary-btn" href="#/analyzer">Scan baru</a></div>${a?`<div class="grid two"><section class="card stack"><p class="eyebrow">Skin score</p><div class="progress-ring" style="--value:${score(a)}"><strong>${score(a)}</strong></div><p class="muted">${summary(a)}</p></section><section class="card stack"><h2>Parameter</h2>${meters(a)}</section></div>`:'<section class="card stack"><h2>Belum ada hasil scan</h2><a class="primary-btn" href="#/analyzer">Mulai scan</a></section>'}</section>`}
  function talk(){setTitle('SKINTalk');app.innerHTML=`<section class="container stack"><div><p class="eyebrow">SKINTalk</p><h2>Konsultasi dan diskusi</h2><p class="muted">Tanyakan kondisi kulit atau rutinitas yang sedang digunakan.</p></div><section class="card stack"><div class="chat-box" id="chatBox">${state.messages.map(m=>`<div class="message ${m.me?'me':''}">${esc(m.text)}<small>${m.at}</small></div>`).join('')||'<p class="muted">Mulai percakapan.</p>'}</div><form id="chatForm" class="row"><input name="text" placeholder="Tulis pertanyaan..." required><button class="primary-btn">Kirim</button></form></section></section>`;$('#chatForm').onsubmit=async e=>{e.preventDefault();const t=e.target.text.value.trim();if(!t)return;e.target.text.value='';state.messages.push({me:true,text:t,at:time()});save();talk();try{const a=await ai(t);state.messages.push({me:false,text:a,at:time()})}catch{state.messages.push({me:false,text:'AI sedang tidak dapat menjawab. Coba lagi nanti.',at:time()})}save();talk()}}
  function profile(){setTitle('Profil');app.innerHTML=`<section class="container stack"><div><p class="eyebrow">Profil</p><h2>Preferensi kulit</h2><p class="muted">Atur profil agar rekomendasi lebih sesuai.</p></div><div class="grid two"><form id="profileForm" class="card form-grid"><label>Nama<input name="name" value="${esc(state.user?.name||'')}"></label><label>Email<input name="email" type="email" value="${esc(state.user?.email||'')}"></label><label>Tipe kulit<select name="skinType">${opts(['normal','oily','dry','combination','sensitive'],state.skinType)}</select></label><button class="primary-btn">Simpan profil</button></form><section class="card stack"><h2>Akses akun</h2><p class="muted">Status: ${state.guest?'Coba tanpa daftar':state.user?'Login aktif':'Belum memilih akses'}</p><div class="row"><a class="primary-btn" href="#/auth">Daftar</a><a class="secondary-btn" href="#/auth">Login</a><button class="ghost-btn" id="guestProfile">Coba tanpa daftar</button></div></section></div></section>`;$('#profileForm').onsubmit=e=>{e.preventDefault();const d=Object.fromEntries(new FormData(e.target));state.user={name:d.name||'Pengguna',email:d.email||''};state.skinType=d.skinType;state.guest=false;save();profile()};$('#guestProfile').onclick=()=>enter(true)}
  function bind(){$$('[data-save]').forEach(b=>b.onclick=()=>{if(!state.saved.includes(b.dataset.save))state.saved.push(b.dataset.save);save();toastMsg('Produk tersimpan.')});$$('[data-ai]').forEach(b=>b.onclick=()=>ask(b.dataset.ai))}
  async function ask(q){modal('<h2 id="modalTitle">DeSkin AI</h2><p class="muted">Menyiapkan jawaban...</p>');try{$('.modal-body').innerHTML='<h2 id="modalTitle">DeSkin AI</h2><p>'+esc(await ai(q))+'</p>'}catch{$('.modal-body').innerHTML='<h2 id="modalTitle">DeSkin AI</h2><p>AI sedang tidak tersedia.</p>'}}
  async function ai(q){const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feature:'DeSkin',message:q})});const d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw Error();return d.answer||'Belum ada jawaban.'}
  function card(p){return`<article class="product-card"><div class="product-img">${p.cat.slice(0,2).toUpperCase()}</div><h3>${esc(p.name)}</h3><p class="muted">${p.cat} · ${idr(p.min)} - ${idr(p.max)}</p><div class="row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="between"><span class="price">${pScore(p)} match</span><span class="pill">${((p.min+p.max)/2)<=90000?'Hemat':'Menengah'}</span></div><button class="primary-btn" data-save="${p.id}">Simpan</button></article>`}
  function recommend(){return[...products].sort((a,b)=>pScore(b)-pScore(a))} function pScore(p){let s=1;state.concerns.forEach(c=>{if(p.issues.includes(c))s++});return s+(state.skinType==='oily'&&p.issues.includes('oil')?2:0)}
  function saved(){return state.saved.map(id=>products.find(p=>p.id===id)).filter(Boolean).map(p=>`<div class="list-item"><strong>${esc(p.name)}</strong><p class="muted">${idr(p.min)} - ${idr(p.max)}</p></div>`).join('')||'<p class="muted">Belum ada produk tersimpan.</p>'}
  function routine(r){return`<label class="checkbox"><input type="checkbox" value="${r.id}" ${r.done?'checked':''}><span><strong>${r.time}</strong> - ${esc(r.title)}</span></label>`} function complete(){return Math.round(state.routine.filter(r=>r.done).length/state.routine.length*100)} function last(){return state.analyses.at(-1)||null}
  function meters(a){a=a||{moisture:0,sebum:0,texture:0,acne:0,sensitivity:0};return[['Kelembapan',a.moisture],['Sebum',a.sebum],['Tekstur',a.texture],['Acne risk',a.acne],['Sensitivitas',a.sensitivity]].map(x=>`<div class="meter"><div class="between"><strong>${x[0]}</strong><span>${x[1]}/100</span></div><div class="meter-bar"><span style="--value:${x[1]}"></span></div></div>`).join('')}
  function score(a){return a?clamp(a.moisture*.24+(100-Math.abs(55-a.sebum))*0.18+a.texture*.22+(100-a.acne)*.22+(100-a.sensitivity)*.14):0} function summary(a){return a.acne>60?'Fokus utama: jerawat.':a.sebum>68?'Sebum terlihat tinggi.':a.moisture<45?'Kelembapan rendah.':'Kondisi cukup seimbang.'}
  function modal(h){close();const t=$('#modalTemplate').content.cloneNode(true);$('.modal-body',t).innerHTML=h;$('.modal-close',t).onclick=close;document.body.appendChild(t)} function close(){$('.modal-backdrop')?.remove()}
  function skin(v){return{normal:'Normal',oily:'Berminyak',dry:'Kering',combination:'Kombinasi',sensitive:'Sensitif'}[v]||'Normal'} function label(v){return{acne:'Jerawat',oil:'Minyak',dry:'Kering',pores:'Pori',redness:'Kemerahan',texture:'Tekstur',uv:'UV'}[v]||v}
  function opts(a,v){return a.map(x=>`<option value="${x}" ${x===v?'selected':''}>${skin(x)}</option>`).join('')} function idr(n){return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n)} function date(d){return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})} function time(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})} function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a} function clamp(x,a=0,b=100){return Math.max(a,Math.min(b,Math.round(x||0)))} function esc(x){return String(x??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))} function toastMsg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2600)} function copyright(){if($('#deskinCopyright'))return;const p=document.createElement('p');p.id='deskinCopyright';p.textContent='© 2026 Muhammad Naufal. All rights reserved.';document.body.appendChild(p)}
  addEventListener('error',()=>{app.innerHTML='<section class="container card stack"><h2>Aplikasi gagal dimuat</h2><p class="muted">Muat ulang halaman untuk membuka kembali DeSkin.</p></section>'});
  boot();
})();
  </script>
</body>
</html>
