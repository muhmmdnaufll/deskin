<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#063b75" />
  <meta name="description" content="DeSkin - digital skin assistant berbasis AI, edukasi, rekomendasi produk, analisis kulit, dan konsultasi." />
  <title>DeSkin - Digital Skin Assistant</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="main.css?v=1.1.0" />
</head>
<body>
  <noscript>Aktifkan JavaScript untuk menggunakan aplikasi DeSkin.</noscript>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside class="sidebar" aria-label="Navigasi utama">
    <a class="brand" href="#/dashboard" aria-label="DeSkin Home">
      <span class="brand-mark">D</span>
      <span>
        <strong>DeSkin</strong>
        <small>Digital Skin Assistant</small>
      </span>
    </a>
    <nav id="mainNav" class="nav"></nav>
    <div class="side-card">
      <p class="eyebrow">Privasi lokal</p>
      <p>Data pengguna disimpan di perangkat dan dipakai untuk personalisasi fitur.</p>
    </div>
  </aside>

  <header class="topbar">
    <button id="menuBtn" class="icon-btn" type="button" aria-label="Buka menu">☰</button>
    <div>
      <p class="eyebrow">DeSkin</p>
      <h1 id="pageTitle">DeSkin</h1>
    </div>
    <div class="top-actions">
      <button id="installBtn" class="ghost-btn hidden" type="button">Install App</button>
      <button id="themeBtn" class="icon-btn" type="button" aria-label="Ganti tema">◐</button>
    </div>
  </header>

  <main id="app" class="app" tabindex="-1"></main>

  <template id="modalTemplate">
    <div class="modal-backdrop" role="presentation">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close icon-btn" type="button" aria-label="Tutup">×</button>
        <div class="modal-body"></div>
      </section>
    </div>
  </template>

  <script>
    window.DESKIN_VERSION = "1.1.0";
    window.addEventListener("error", function (event) {
      var app = document.getElementById("app");
      if (!app) return;
      app.innerHTML = '<section class="container card stack"><h2>Aplikasi gagal dimuat</h2><p class="muted">Silakan refresh halaman. Jika masih kosong, hapus cache/site data browser lalu buka ulang.</p><p class="muted">Detail: ' + String(event.message || "unknown error") + '</p></section>';
    });
    window.addEventListener("DOMContentLoaded", function () {
      var applyVersion = function () {
        document.querySelectorAll(".footer-note").forEach(function (node) {
          node.textContent = "Versi 1.1.0. Data pengguna tersimpan lokal di perangkat.";
        });
      };
      applyVersion();
      new MutationObserver(applyVersion).observe(document.body, { childList: true, subtree: true });
    });
  </script>
  <script src="main.js?v=1.1.0" defer></script>
</body>
</html>
