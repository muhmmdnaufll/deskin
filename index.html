<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#063b75" />
  <meta name="description" content="DeSkin - digital skin assistant berbasis AI, edukasi, konsultasi, rekomendasi produk, dan progress tracking." />
  <title>DeSkin - Digital Skin Assistant</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <noscript>Aktifkan JavaScript untuk menggunakan aplikasi DeSkin.</noscript>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside class="sidebar" aria-label="Navigasi utama">
    <a class="brand" href="#/dashboard" aria-label="DeSkin Home">
      <span class="brand-mark">D</span>
      <span>
        <strong>DeSkin</strong>
        <small>Digital Skin Assistant</small>
      </span>
    </a>
    <nav id="mainNav" class="nav"></nav>
    <div class="side-card">
      <p class="eyebrow">Mode ringan</p>
      <p>Semua data demo disimpan lokal di browser.</p>
    </div>
  </aside>

  <header class="topbar">
    <button id="menuBtn" class="icon-btn" type="button" aria-label="Buka menu">☰</button>
    <div>
      <p class="eyebrow">DeSkin</p>
      <h1 id="pageTitle">DeSkin</h1>
    </div>
    <div class="top-actions">
      <button id="installBtn" class="ghost-btn hidden" type="button">Install App</button>
      <button id="themeBtn" class="icon-btn" type="button" aria-label="Ganti tema">◐</button>
    </div>
  </header>

  <main id="app" class="app" tabindex="-1"></main>

  <template id="modalTemplate">
    <div class="modal-backdrop" role="presentation">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close icon-btn" type="button" aria-label="Tutup">×</button>
        <div class="modal-body"></div>
      </section>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
                              <footer class="site-footer">
    <div class="container footer-grid">
      <p>© <span id="year"></span> Muhammad Naufal. All rights reserved.</p>
    </div>
  </footer>
